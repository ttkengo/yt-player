<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#000; width:100%; height:100%; overflow:hidden; }
.wrap { position:relative; width:100%; padding-bottom:56.25%; }
iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
</style>
</head>
<body>
<div class="wrap">
<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get('v');
const startTime = parseInt(params.get('t') || '0');
if (videoId) {
  document.getElementById('player').src =
    'https://www.youtube.com/embed/' + videoId +
    '?enablejsapi=1&autoplay=0&rel=0&playsinline=1&start=' + startTime + '&modestbranding=1';
}

var fadeTimer = null;

function sendCmd(cmd, args) {
  var f = document.getElementById('player');
  if (f && f.contentWindow)
    f.contentWindow.postMessage(JSON.stringify({event:'command', func:cmd, args:args||[]}), '*');
}

function fadeOut(duration) {
  if (fadeTimer) clearInterval(fadeTimer);
  var steps = Math.max(1, Math.round(duration * 1000 / 50));
  var volStep = 100 / steps;
  var vol = 100;
  sendCmd('unMute');
  sendCmd('setVolume', [vol]);
  fadeTimer = setInterval(function() {
    vol -= volStep;
    if (vol <= 0) {
      vol = 0;
      clearInterval(fadeTimer);
      fadeTimer = null;
      sendCmd('mute');
    }
    sendCmd('setVolume', [Math.round(vol)]);
  }, 50);
}

// React Native → player.html コマンド受信
window.addEventListener('message', function(e) {
  try {
    var msg = JSON.parse(e.data);
    if (msg.type === 'fadeOut') { fadeOut(msg.duration || 1.0); return; }
    if (msg.event === 'command') { sendCmd(msg.func, msg.args); return; }
  } catch(err) {}
});

// YouTube IFrame → player.html
window.addEventListener('message', function(e) {
  try {
    var data = JSON.parse(e.data);
    if (data.event === 'infoDelivery' && data.info && data.info.currentTime !== undefined) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type: 'currentTime', value: data.info.currentTime })
        );
      }
    }
    if (data.event === 'onStateChange') {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type: 'stateChange', state: data.info, fullData: JSON.stringify(data) })
        );
      }
    }
  } catch(err) {}
});

// onReady後にaddEventListenerを登録
window.addEventListener('message', function(e) {
  try {
    var data = JSON.parse(e.data);
    if (data.event === 'onReady') {
      sendCmd('addEventListener', ['onStateChange']);
    }
  } catch(err) {}
});

// 200ms毎にcurrentTimeをポーリング
setInterval(function() {
  var f = document.getElementById('player');
  if (f && f.contentWindow)
    f.contentWindow.postMessage(JSON.stringify({ event: 'listening' }), '*');
}, 100);
</script>
</body>
</html>
