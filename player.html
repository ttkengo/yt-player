<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#000; width:100%; height:100%; overflow:hidden; }
.wrap { position:relative; width:100%; padding-bottom:56.25%; }
iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
</style>
</head>
<body>
<div class="wrap">
<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get('v');
const startTime = parseInt(params.get('t') || '0');
if (videoId) {
  document.getElementById('player').src =
    'https://www.youtube.com/embed/' + videoId +
    '?enablejsapi=1&autoplay=1&rel=0&playsinline=1&start=' + startTime + '&modestbranding=1';
}

// ── 音量フェード管理 ────────────────────────────────────────────
var currentVolume = 100;
var fadeTimer = null;

function setVol(v) {
  currentVolume = Math.max(0, Math.min(100, v));
  var iframe = document.getElementById('player');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(
      JSON.stringify({event:'command', func:'setVolume', args:[currentVolume]}), '*'
    );
  }
}

function clearFade() {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
}

function fadeIn(duration) {
  clearFade();
  var steps = Math.max(1, Math.round(duration * 20)); // 50ms間隔
  var volStep = 100 / steps;
  var current = 0;
  setVol(0);
  fadeTimer = setInterval(function() {
    current += volStep;
    if (current >= 100) {
      setVol(100);
      clearFade();
    } else {
      setVol(current);
    }
  }, 50);
}

function fadeOut(duration) {
  clearFade();
  var steps = Math.max(1, Math.round(duration * 20));
  var volStep = 100 / steps;
  var current = 100;
  fadeTimer = setInterval(function() {
    current -= volStep;
    if (current <= 0) {
      setVol(0);
      clearFade();
    } else {
      setVol(current);
    }
  }, 50);
}

function muteNow() {
  clearFade();
  setVol(0);
}

// ── React Native → player.html コマンド受信 ────────────────────
window.addEventListener('message', function(e) {
  try {
    var msg = JSON.parse(e.data);
    var iframe = document.getElementById('player');

    // フェードコマンド
    if (msg.type === 'fadeIn')  { fadeIn(msg.duration || 0.5); return; }
    if (msg.type === 'fadeOut') { fadeOut(msg.duration || 0.5); return; }
    if (msg.type === 'muteNow') { muteNow(); return; }

    // YouTube IFrameへの転送コマンド
    if (msg.event === 'command' && iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage(JSON.stringify(msg), '*');
    }
  } catch(err) {}
});

// ── YouTube IFrame → player.html 現在時刻受信 ─────────────────
window.addEventListener('message', function(e) {
  try {
    var data = JSON.parse(e.data);
    if (data.event === 'infoDelivery' && data.info && data.info.currentTime !== undefined) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type: 'currentTime', value: data.info.currentTime })
        );
      }
    }
  } catch(err) {}
});

// ── 200ms毎にYouTubeに現在時刻を問い合わせ ────────────────────
setInterval(function() {
  var iframe = document.getElementById('player');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(
      JSON.stringify({ event: 'listening' }), '*'
    );
  }
}, 200);
</script>
</body>
</html>
