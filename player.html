<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#000; width:100%; height:100%; overflow:hidden; }
.wrap { position:relative; width:100%; padding-bottom:56.25%; }
iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }
</style>
</head>
<body>
<div class="wrap">
<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get('v');
const startTime = parseInt(params.get('t') || '0');
if (videoId) {
  document.getElementById('player').src =
    'https://www.youtube.com/embed/' + videoId +
    '?enablejsapi=1&autoplay=1&rel=0&playsinline=1&start=' + startTime + '&modestbranding=1';
}

// ── 音量フェード管理 ────────────────────────────────────────────
var currentVolume = 100;
var fadeTimer = null;
var pendingFadeIn = null;   // 再生開始時に実行予定のfadeIn duration
var pendingFadeOut = null;  // 再生開始時に実行予定のfadeOut duration
var isSeeking = false;      // seek中フラグ（muteNow後にtrueになる）

function setVol(v) {
  currentVolume = Math.max(0, Math.min(100, v));
  var iframe = document.getElementById('player');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(
      JSON.stringify({event:'command', func:'setVolume', args:[currentVolume]}), '*'
    );
  }
}

function clearFade() {
  if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
}

function fadeIn(duration) {
  clearFade();
  pendingFadeIn = null;
  pendingFadeOut = null;
  var steps = Math.max(1, Math.round(duration * 20));
  var volStep = 100 / steps;
  var current = 0;
  setVol(0);
  fadeTimer = setInterval(function() {
    current += volStep;
    if (current >= 100) {
      setVol(100);
      clearFade();
    } else {
      setVol(current);
    }
  }, 50);
}

function fadeOut(duration) {
  clearFade();
  pendingFadeIn = null;
  pendingFadeOut = null;
  var steps = Math.max(1, Math.round(duration * 20));
  var volStep = 100 / steps;
  var current = 100;
  fadeTimer = setInterval(function() {
    current -= volStep;
    if (current <= 0) {
      setVol(0);
      clearFade();
    } else {
      setVol(current);
    }
  }, 50);
}

function muteNow() {
  clearFade();
  pendingFadeIn = null;
  pendingFadeOut = null;
  isSeeking = true;  // seek開始フラグ
  setVol(0);
}

// 再生開始時（state=1）に呼ばれる: pendingFadeを実行
function onPlaybackStarted() {
  isSeeking = false;
  if (pendingFadeIn !== null) {
    var dur = pendingFadeIn;
    pendingFadeIn = null;
    fadeIn(dur);
  } else if (pendingFadeOut !== null) {
    var dur2 = pendingFadeOut;
    pendingFadeOut = null;
    fadeOut(dur2);
  }
  // pendingなし・muteNow済みの場合は音量0のまま維持
}

// ── React Native → player.html コマンド受信 ────────────────────
window.addEventListener('message', function(e) {
  try {
    var msg = JSON.parse(e.data);
    var iframe = document.getElementById('player');

    if (msg.type === 'fadeIn') {
      if (isSeeking) {
        // seek中: 再生開始まで保留（古いpendingを上書き）
        pendingFadeIn = msg.duration || 0.5;
        pendingFadeOut = null;
      } else {
        fadeIn(msg.duration || 0.5);
      }
      return;
    }
    if (msg.type === 'fadeOut') {
      if (isSeeking) {
        pendingFadeOut = msg.duration || 0.5;
        pendingFadeIn = null;
      } else {
        fadeOut(msg.duration || 0.5);
      }
      return;
    }
    if (msg.type === 'muteNow') { muteNow(); return; }

    // YouTube IFrameへの転送コマンド
    if (msg.event === 'command' && iframe && iframe.contentWindow) {
      iframe.contentWindow.postMessage(JSON.stringify(msg), '*');
    }
  } catch(err) {}
});

// ── YouTube IFrame → player.html メッセージ受信 ───────────────
window.addEventListener('message', function(e) {
  try {
    var data = JSON.parse(e.data);

    // 現在時刻をReact Nativeに送信
    if (data.event === 'infoDelivery' && data.info && data.info.currentTime !== undefined) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(
          JSON.stringify({ type: 'currentTime', value: data.info.currentTime })
        );
      }
    }

    // 再生状態変化を検知
    if (data.event === 'onStateChange') {
      var state = data.info;
      if (state === 1) {
        // 再生開始: pendingFadeがあれば実行
        onPlaybackStarted();
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: 'playbackStarted' })
          );
        }
      } else if (state === 2) {
        // 一時停止
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: 'playbackPaused' })
          );
        }
      } else if (state === 3) {
        // バッファリング中もseekingとみなす
        isSeeking = true;
      }
    }
  } catch(err) {}
});

// ── 200ms毎にYouTubeに現在時刻を問い合わせ ────────────────────
setInterval(function() {
  var iframe = document.getElementById('player');
  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(
      JSON.stringify({ event: 'listening' }), '*'
    );
  }
}, 200);
</script>
</body>
</html>
